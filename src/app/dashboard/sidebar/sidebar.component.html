<div class="sidebar">
  <div class="list-group">
    <a routerLink="/dashboard/home" routerLinkActive="active" i18n>
      <i class="fa-solid fa-house" aria-hidden="true"></i> INICIO
    </a>
    <a routerLink="/dashboard/events" routerLinkActive="active" i18n>
      <i class="fa-solid fa-file-lines" aria-hidden="true"></i> EVENTOS
    </a>
    <a routerLink="/dashboard/files" routerLinkActive="active" i18n>
      <i class="fa-solid fa-file-lines" aria-hidden="true"></i> ARCHIVOS
    </a>
    @if (isAdmin) {
      <a routerLink="/dashboard/users" routerLinkActive="active" i18n>
      <i class="fa-solid fa-user" aria-hidden="true"></i> USUARIOS
    </a>
    }
    @if (isAdmin) {
      <a routerLink="/dashboard/logs" routerLinkActive="active" i18n>
      <i class="fa-solid fa-user" aria-hidden="true"></i> LOGS
    </a>
    }
    @if (isAdmin) {
      <a routerLink="/dashboard/testing" routerLinkActive="active" i18n>
      <i class="fa-solid fa-flask" aria-hidden="true"></i> TESTING
    </a>
    }
    <a routerLink="/dashboard/settings" routerLinkActive="active" i18n>
      <i class="fa-solid fa-gear" aria-hidden="true"></i> CONFIGURACIÓN
    </a>
  </div>
</div>
