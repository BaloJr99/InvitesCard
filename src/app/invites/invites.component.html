@switch (inviteResolved.eventInformation.typeOfEvent) {
  @case (eventType.Xv) {
    <app-sweet-xv [designName]="inviteResolved.eventInformation.designName"></app-sweet-xv>
  }
  @case (eventType.SaveTheDate) {
    <app-save-the-date></app-save-the-date>
  }
  @case (eventType.Wedding) {
    <app-wedding></app-wedding>
  }
}
